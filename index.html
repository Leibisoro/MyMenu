<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sushi Eve — AR Menu</title>
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "./js/lib/mindar-image-three.js"
  }
}
</script>
</head>
<body>
<div id="container"></div>
<svg id="connectors"></svg>

<div id="panel-desc" class="glass-panel">
  <h2 id="pd-title"></h2>
  <div class="divider"></div>
  <p id="pd-text"></p>
  <div class="anchor-dot" data-corner="br"></div>
</div>

<div id="panel-nutrition" class="glass-panel">
  <h3>NUTRITION FACTS</h3>
  <div class="divider"></div>
  <div class="n-row"><span class="n-label"><svg class="n-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"><path d="M12 22c4 0 7-3 7-7 0-3-2-5-3-7 0 2-1 4-3 4-1 0-2-1-2-2 0-2 1-3 1-5-3 2-6 6-6 10 0 4 3 7 6 7z"/></svg>Calories</span><span id="n-cal" class="n-val"></span></div>
  <div class="n-row"><span class="n-label"><svg class="n-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"><path d="M8 21c-2-1-4-3-4-6 0-2 1-3 1-5 0-4 3-7 7-7s6 3 6 6c0 2-1 3-1 5 0 4-3 7-6 7"/><circle cx="9" cy="10" r="1" fill="currentColor" stroke="none"/><circle cx="13" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="13" r="1" fill="currentColor" stroke="none"/></svg>Protein</span><span id="n-protein" class="n-val"></span></div>
  <div class="n-row"><span class="n-label"><svg class="n-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"><path d="M4 11h16c0 5-3 9-8 9s-8-4-8-9z"/><path d="M4 11c0-1 .5-2 1-2M9 11c0-1.5.5-3 1-4M14 11c0-1.5-.5-3-1-4M19 11c0-1-.5-2-1-2"/><path d="M2 11h20"/></svg>Carbohydrates</span><span id="n-carbs" class="n-val"></span></div>
  <div class="n-row"><span class="n-label"><svg class="n-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"><path d="M12 3c4 1 6 5 6 9a6 6 0 0 1-12 0c0-4 2-8 6-9z"/><circle cx="12" cy="14" r="3.2"/></svg>Fats</span><span id="n-fat" class="n-val"></span></div>
  <div class="n-note">*Values are approximate</div>
  <div class="anchor-dot" data-corner="bl"></div>
</div>

<div id="panel-price" class="glass-panel">
  <h3>PRICE</h3>
  <div class="divider"></div>
  <div id="pp-price"></div>
  <div class="anchor-dot" data-corner="tr"></div>
</div>

<div id="hud"><div id="status" class="lost">Marker: not detected</div></div>
<div id="hint">Drag to rotate · Pinch to zoom · Swipe to change dish</div>
<div id="dots"></div>
<div id="loading">Loading model…</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
